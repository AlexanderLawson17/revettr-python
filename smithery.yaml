startCommand:
  type: http
  configSchema:
    type: object
    properties:
      revettrWalletKey:
        type: string
        title: Wallet Private Key
        description: "Base wallet private key for x402 payments (optional — without it, you'll get 402 responses)"
    required: []
  commandFunction: |-
    (config) => ({
      command: 'python',
      args: ['-m', 'revettr_mcp.serve_http'],
      env: {
        REVETTR_URL: 'https://revettr.com',
        ...(config.revettrWalletKey ? { REVETTR_WALLET_KEY: config.revettrWalletKey } : {}),
        PORT: '{{port}}'
      }
    })
build:
  dockerfile: Dockerfile
